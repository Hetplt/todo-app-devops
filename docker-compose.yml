services:

  mongo:
    image: mongo
    container_name: mongo
    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: todo-backend

    ports:
      - "5000:5000"

    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: todo-frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

volumes:
  mongo-data:
